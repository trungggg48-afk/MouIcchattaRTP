settings:
  debug: false
  folia-mode: true

menu:
  title: "&8Chọn thế giới RTP"
  size: 27
  fill-empty-slots: true
  filler-material: BLACK_STAINED_GLASS_PANE
  filler-name: " "

teleport:
  countdown-seconds: 5
  cancel-on-move: true
  cancel-on-damage: true
  safe-teleport: true
  max-attempts: 100
  stand-center: true
  check-two-blocks-air: true
  avoid-liquid: true
  avoid-lava: true
  avoid-cactus: true
  avoid-magma: true
  avoid-fire: true
  avoid-void: true
  avoid-leaves: false
  avoid-water: true

cooldown:
  enabled: true
  seconds: 60
  bypass-permission: "moulrtp.bypass.cooldown"

combat:
  enabled: false
  tag-seconds: 15
  block-rtp-while-tagged: true

bossbar:
  enabled: false
  title: "&eRTP sau &6%seconds% &egiây..."
  color: YELLOW
  style: SOLID

titles:
  enabled: false
  title: "&6&lRTP"
  subtitle: "&eDịch chuyển sau &6%seconds% &egiây"

actionbar:
  enabled: true
  message: "&eDịch chuyển sau &6%seconds% &egiây"

sounds:
  countdown:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_HAT
    volume: 1.0
    pitch: 1.0
  success:
    enabled: true
    sound: ENTITY_ENDERMAN_TELEPORT
    volume: 1.0
    pitch: 1.0
  cancel:
    enabled: true
    sound: ENTITY_VILLAGER_NO
    volume: 1.0
    pitch: 1.0
  menu-open:
    enabled: true
    sound: UI_BUTTON_CLICK
    volume: 1.0
    pitch: 1.0

messages:
  prefix: "&6&lRTP &8» "
  no-permission: "&cBạn không có quyền dùng lệnh này."
  only-player: "&cChỉ người chơi mới dùng được lệnh này."
  player-not-found: "&cKhông tìm thấy người chơi."
  reloading: "&eĐang reload plugin..."
  reload-success: "&aĐã reload config thành công."
  world-not-found: "&cWorld &f%world% &ckhông tồn tại."
  world-disabled: "&cWorld này đang tắt RTP."
  no-safe-location: "&cKhông tìm được vị trí an toàn. Hãy thử lại."
  already-teleporting: "&cBạn đang trong quá trình RTP."
  cooldown: "&cBạn cần chờ &f%seconds%s &cđể dùng RTP tiếp."
  countdown: "&eDịch chuyển sau &6%seconds% &egiây..."
  teleporting: "&aĐang tìm vị trí an toàn..."
  success: "&aĐã RTP đến &f%world% &a(&f%x%&7, &f%y%&7, &f%z%&a)."
  cancelled-move: "&cBạn đã di chuyển, RTP bị hủy."
  cancelled-damage: "&cBạn vừa nhận sát thương, RTP bị hủy."
  cancelled-combat: "&cBạn đang trong combat nên không thể RTP."
  invalid-world: "&cWorld không hợp lệ."

worlds:
  world:
    enabled: true
    display-name: "&aOverworld"
    material: GRASS_BLOCK
    slot: 11
    permission: "moulrtp.world.overworld"
    min-x: -5000
    max-x: 5000
    min-z: -5000
    max-z: 5000
    min-y: 60
    max-y: 320
    blacklist-biomes: []
    blacklist-blocks:
      - LAVA
      - WATER
      - CACTUS
      - MAGMA_BLOCK
      - FIRE
      - CAMPFIRE
      - SOUL_CAMPFIRE

  world_nether:
    enabled: true
    display-name: "&cNether"
    material: NETHERRACK
    slot: 13
    permission: "moulrtp.world.nether"
    min-x: -3000
    max-x: 3000
    min-z: -3000
    max-z: 3000
    min-y: 32
    max-y: 120
    blacklist-biomes: []
    blacklist-blocks:
      - LAVA
      - FIRE
      - MAGMA_BLOCK
      - SOUL_FIRE

  world_the_end:
    enabled: true
    display-name: "&5The End"
    material: END_STONE
    slot: 15
    permission: "moulrtp.world.end"
    min-x: -3000
    max-x: 3000
    min-z: -3000
    max-z: 3000
    min-y: 40
    max-y: 120
    blacklist-biomes: []
    blacklist-blocks:
      - AIR

commands:
  rtp:
    aliases: []
  reload:
    enabled: true
    permission: "moulrtp.admin.reload"

permissions:
  use: "moulrtp.use"
  admin: "moulrtp.admin"
