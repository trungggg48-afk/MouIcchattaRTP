    max-radius: 3000
    delay-seconds: 5
    cooldown-seconds: 60
    allow-water: false
    allow-nether-roof: false

  nether:
    enabled: true
    world: "world_nether"
    permission: "moulcchttaa.rtp.nether"
    min-radius: 300
    max-radius: 1500
    delay-seconds: 5
    cooldown-seconds: 120
    allow-water: false
    allow-nether-roof: false

  end:
    enabled: true
    world: "world_the_end"
    permission: "moulcchttaa.rtp.end"
    min-radius: 300
    max-radius: 1500
    delay-seconds: 5
    cooldown-seconds: 120
    allow-water: false
    allow-nether-roof: false
